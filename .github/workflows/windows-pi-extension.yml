name: pi-extension (Windows)

# Valida o suporte Windows do supervisor + mesh local (plano 40) em Windows REAL,
# fechando os itens que o dev host macOS não consegue exercer (named pipe, schtasks,
# encoding do XML do Task Scheduler). Disparado por mudanças em pi-extension/.

on:
  push:
    branches: [main]
    paths:
      - "pi-extension/**"
      - ".github/workflows/windows-pi-extension.yml"
  pull_request:
    paths:
      - "pi-extension/**"
      - ".github/workflows/windows-pi-extension.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: pi-extension

jobs:
  # Suíte completa em Windows REAL — ARM64 (paridade c/ o dev) + x64 (maioria dos
  # usuários). Exerce os ramos win32 (ipcAddress/resolvePiBin/schtasks-cmd) que hoje
  # só rodam platform-injected no macOS, agora no Node-Windows de verdade.
  test:
    name: test (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [windows-11-arm, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pi-extension/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  # Smoke do backend de serviço Windows: registra o supervisor via schtasks e confere
  # que a task existe e some. Se o XML do Task Scheduler estiver mal-encodado
  # (UTF-8 vs UTF-16 — item de risco do plano 40), o `schtasks /Create` falha aqui.
  smoke-service:
    name: smoke — schtasks install/query/uninstall
    needs: test
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pi-extension/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: install (registra a scheduled task via schtasks /Create /XML)
        run: node dist/index.js install

      - name: assert — a task RemotePiSupervisor existe (valida XML + /Create)
        shell: pwsh
        run: schtasks /Query /TN RemotePiSupervisor

      - name: uninstall (remove a task)
        run: node dist/index.js uninstall

      - name: assert — a task sumiu após uninstall
        shell: pwsh
        run: |
          schtasks /Query /TN RemotePiSupervisor 2>$null
          if ($LASTEXITCODE -eq 0) { Write-Error "task ainda presente após uninstall"; exit 1 }
          Write-Host "task removida com sucesso"

  # Smoke do named-pipe IPC: sobe o supervisor e fala com ele pelo pipe (sem modelo).
  # Prova o caminho `\\.\pipe\remote-pi-*-<user>` (Bloco A) sob o Node-Windows real.
  # continue-on-error: 1ª iteração — o gerenciamento de processo em background no
  # runner pode precisar de ajuste; o resultado é informativo, não bloqueia a CI.
  smoke-pipe:
    name: smoke — named-pipe IPC (best-effort)
    needs: test
    runs-on: windows-11-arm
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pi-extension/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: sobe o supervisor e conecta pelo pipe
        shell: pwsh
        run: |
          $sup = Start-Process node -ArgumentList "dist/bin/supervisord.js" -PassThru -WorkingDirectory $PWD
          Start-Sleep -Seconds 4
          node dist/index.js daemons
          $code = $LASTEXITCODE
          Stop-Process -Id $sup.Id -Force -ErrorAction SilentlyContinue
          if ($code -ne 0) { Write-Error "client não alcançou o supervisor pelo named pipe (exit $code)"; exit 1 }
          Write-Host "named-pipe IPC ok"

  # PENDENTE (fica pra um follow-up — precisa do `pi` instalado + provider/secret):
  #   - pi.cmd resolvido via `where` + spawn de um daemon (Bloco B em runtime)
  #   - cron 1 job ponta-a-ponta: `cron add <id> "* * * * * *"`... → assert linha em
  #     cron.jsonl. O cron audita só o DISPARO (fire-and-forget, plano 39), então
  #     basta um provider barato/stub configurado via secret pra o daemon spawnar.
